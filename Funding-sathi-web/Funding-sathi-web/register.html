<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Funding Sathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #F7F7F3;
      --cream2: #F5F0EB;
      --black: #0D0D0D;
      --dark: #2B1D21;
      --burg: #6A1B31;
      --burg2: #6A1B31;
      --text: #2B1D21;
      --muted: #6B6B6B;
      --border: #E8D8D8;
      --error: #d32f2f;
      --success: #388e3c;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #F7F7F3 0%, #F5F0EB 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
    }

    .logo-mark {
      width: 40px;
      height: auto;
    }

    .logo-text {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }

    .logo-f {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--burg);
    }

    .logo-s {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--burg);
    }

    .header-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .header-links a {
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .header-links a:hover {
      color: var(--burg);
    }

    .btn-login {
      background: var(--burg);
      color: white;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background: var(--burg2);
      transform: translateY(-2px);
    }

    /* ─── MAIN CONTAINER ─── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 2rem 4rem;
      margin-top: 70px;
    }

    .register-wrapper {
      width: 100%;
      max-width: 480px;
    }

    .register-card {
      background: white;
      border-radius: 12px;
      padding: 3.5rem;
      box-shadow: 0 8px 32px rgba(84, 24, 40, 0.08);
      border: 1px solid rgba(84, 24, 40, 0.05);
    }

    .register-header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .register-header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--burg);
      margin-bottom: 0.5rem;
    }

    .register-header p {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.6rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: all 0.3s;
      background: white;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--burg);
      box-shadow: 0 0 0 3px rgba(84, 24, 40, 0.1);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .terms-checkbox {
      display: flex;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      align-items: flex-start;
    }

    .terms-checkbox input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--burg);
      flex-shrink: 0;
    }

    .terms-checkbox label {
      cursor: pointer;
      color: var(--muted);
      line-height: 1.4;
    }

    .terms-checkbox a {
      color: var(--burg);
      text-decoration: none;
    }

    .terms-checkbox a:hover {
      text-decoration: underline;
    }

    .form-submit {
      width: 100%;
      padding: 13px;
      background: var(--burg);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1.5rem;
    }

    .form-submit:hover {
      background: var(--burg2);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(84, 24, 40, 0.2);
    }

    .form-submit:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .login-link a {
      color: var(--burg);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .login-link a:hover {
      color: var(--burg2);
    }

    /* ─── DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      gap: 1rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ─── SOCIAL LOGIN ─── */
    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 11px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .social-btn:hover {
      border-color: var(--burg);
      color: var(--burg);
    }

    /* ─── ALERT ─── */
    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(211, 47, 47, 0.1);
      color: var(--error);
      border: 1px solid var(--error);
    }

    .alert-success {
      background: rgba(56, 142, 60, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--black);
      color: var(--cream);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
    }

    footer a {
      color: var(--cream);
      text-decoration: none;
      margin: 0 1rem;
    }

    footer a:hover {
      color: var(--burg);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header {
        padding: 1rem 1.5rem;
      }

      .header-inner {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .header-links {
        flex-direction: column;
        gap: 1rem;
      }

      main {
        padding: 100px 1rem 2rem;
      }

      .register-card {
        padding: 2.5rem 1.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .social-login {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="assets/Screenshot 2026-04-13 155923-Photoroom.png" alt="Funding Sathi" class="logo-mark"/>
        <div class="logo-text">
          <span class="logo-f">Funding</span>
          <span class="logo-s">Sathi</span>
        </div>
      </a>
      <div class="header-links">
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
        <a href="login.html" class="btn-login">Sign In</a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <div class="register-wrapper">
      <div class="register-card">
        <!-- Header -->
        <div class="register-header">
          <h1>Create Account</h1>
          <p>Join Funding Sathi for enterprise financing</p>
        </div>

        <!-- Alert Messages -->
        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <!-- Registration Form -->
        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input 
                type="text" 
                class="form-input" 
                name="firstName" 
                placeholder="John"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input 
                type="text" 
                class="form-input" 
                name="lastName" 
                placeholder="Doe"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Company Name</label>
            <input 
              type="text" 
              class="form-input" 
              name="company" 
              placeholder="Your Company Pvt. Ltd."
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Business Email</label>
            <input 
              type="email" 
              class="form-input" 
              name="email" 
              placeholder="name@company.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Annual Turnover</label>
            <select class="form-input" name="turnover" required>
              <option value="">Select Range</option>
              <option value="100-250">₹100Cr – ₹250Cr</option>
              <option value="250-500">₹250Cr – ₹500Cr</option>
              <option value="500-1000">₹500Cr – ₹1000Cr</option>
              <option value="1000+">₹1000Cr+</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input 
              type="tel" 
              class="form-input" 
              name="phone" 
              placeholder="+91 98765 43210"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input 
              type="password" 
              class="form-input" 
              name="password" 
              id="passwordInput"
              placeholder="Create a strong password"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input 
              type="password" 
              class="form-input" 
              name="confirmPassword" 
              id="confirmPasswordInput"
              placeholder="Confirm password"
              required
            />
          </div>

          <!-- Terms & Conditions -->
          <div class="terms-checkbox">
            <input type="checkbox" id="terms" name="terms" required/>
            <label for="terms">
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I also consent to receive communications about financing products.
            </label>
          </div>

          <button type="submit" class="form-submit">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">Or Sign Up With</div>
          <div class="divider-line"></div>
        </div>

        <!-- Social Signup -->
        <div class="social-login">
          <button class="social-btn" onclick="alert('Google signup coming soon')">
            <span>🔵</span> Google
          </button>
          <button class="social-btn" onclick="alert('LinkedIn signup coming soon')">
            <span>🔗</span> LinkedIn
          </button>
        </div>

        <!-- Login Link -->
        <div class="login-link">
          Already have an account? <a href="login.html">Sign in here</a>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div>
      <a href="index.html">Home</a>
      <a href="index.html#services">Services</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
    </div>
    <div style="margin-top: 1rem; font-size: 0.75rem; color: rgba(247, 247, 243, 0.5);">
      © 2025 Funding Sathi Pvt. Ltd. All rights reserved.
    </div>
  </footer>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const firstName = registerForm.firstName.value.trim();
      const lastName = registerForm.lastName.value.trim();
      const company = registerForm.company.value.trim();
      const email = registerForm.email.value.trim();
      const turnover = registerForm.turnover.value;
      const phone = registerForm.phone.value.trim();
      const password = registerForm.password.value;
      const confirmPassword = registerForm.confirmPassword.value;
      const terms = registerForm.terms.checked;

      // Reset alerts
      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');

      // Validation
      if (!firstName || !lastName || !company || !email || !turnover || !phone || !password) {
        errorAlert.textContent = '❌ Please fill in all required fields';
        errorAlert.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errorAlert.textContent = '❌ Password must be at least 8 characters';
        errorAlert.classList.add('show');
        return;
      }

      if (password !== confirmPassword) {
        errorAlert.textContent = '❌ Passwords do not match';
        errorAlert.classList.add('show');
        return;
      }

      if (!terms) {
        errorAlert.textContent = '❌ Please accept the terms and conditions';
        errorAlert.classList.add('show');
        return;
      }

      // Simulate registration
      successAlert.textContent = '✓ Account created successfully! Redirecting to dashboard...';
      successAlert.classList.add('show');

      // Store user data and redirect to dashboard
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userName', firstName + ' ' + lastName);
      localStorage.setItem('userCompany', company);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('registrationTime', new Date().toISOString());

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
